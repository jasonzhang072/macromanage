<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Response - MacroManage</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: { 50: '#FFFBF5', 100: '#FDF6E9', 200: '#F5EBD8', 300: '#EDE0C8', 400: '#E5D5B8' },
                        brown: { 400: '#C4A882', 500: '#B8956E', 600: '#9A7B5A', 700: '#7D6245', 800: '#604A32' }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { background: #FDF6E9; font-family: 'DM Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-md w-full" id="responseContainer">
        <div class="text-center">
            <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-2xl font-bold" id="statusIcon" style="background: linear-gradient(135deg, #B8956E 0%, #9A7B5A 100%);">
                ✓
            </div>
            <h1 class="text-2xl font-bold text-brown-700 mb-2" id="statusTitle">Processing...</h1>
            <p class="text-brown-600 mb-6" id="statusMessage">Please wait while we record your response.</p>
        </div>
        <div id="availabilityForm" class="hidden">
            <h2 class="text-xl font-bold text-brown-700 mb-4">When are you available?</h2>
            <p class="text-sm text-brown-600 mb-4">Select any dates and times you're available. The host will find overlapping times.</p>
            
            <!-- Calendar -->
            <div class="mb-4">
                <div class="flex justify-between items-center mb-3">
                    <button onclick="changeMonth(-1)" class="text-brown-600 hover:text-brown-800 font-bold text-xl px-3 py-1">‹</button>
                    <span class="font-semibold text-brown-700" id="calendarMonth"></span>
                    <button onclick="changeMonth(1)" class="text-brown-600 hover:text-brown-800 font-bold text-xl px-3 py-1">›</button>
                </div>
                <div class="grid grid-cols-7 gap-1" id="calendar"></div>
                <p class="text-xs text-brown-400 mt-2" id="selectedCount">0 date(s) selected</p>
            </div>
            
            <!-- Time Slots -->
            <div id="timeSlots" class="mb-4"></div>
            
            <button onclick="submitAvailability()" class="w-full px-6 py-3 rounded-full font-semibold text-white transition-all hover:opacity-90" style="background: linear-gradient(135deg, #B8956E 0%, #9A7B5A 100%);">
                Submit Availability
            </button>
        </div>
        <div id="finalMessage" class="hidden text-center space-y-3">
            <a href="/" class="inline-block px-6 py-3 rounded-full font-semibold text-white transition-all hover:opacity-90" style="background: linear-gradient(135deg, #B8956E 0%, #9A7B5A 100%);">
                Open MacroManage Website
            </a>
            <p class="text-sm text-brown-400 mt-2">Or open the MacroManage app if you have it installed:</p>
            <a id="deepLinkBtn" href="#" class="inline-block px-6 py-3 rounded-full font-semibold transition-all hover:opacity-90 border-2" style="color: #7D6245; border-color: #B8956E;">
                Open in App
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event');
        const email = urlParams.get('email');
        const response = urlParams.get('response');
        const eventTitle = urlParams.get('title') || 'Event';

        let eventData = { id: eventId, title: eventTitle };
        let selectedDates = [];
        let dateTimeSlots = {}; // { 'date': [{start: '', end: ''}, ...] }
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        // Detect mobile device
        function isMobile() {
            return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        }

        function buildDeepLink(action) {
            const name = email ? email.split('@')[0] : '';
            return `macromanage://respond?eventId=${eventId}&action=${action}&name=${encodeURIComponent(name)}`;
        }

        // On mobile, immediately try to open the app via deep link
        // The web page stays loaded as a fallback if the app isn't installed
        if (isMobile() && eventId && response) {
            const deepLink = buildDeepLink(response === 'accept' ? 'accept' : 'decline');
            // Use a hidden iframe first (avoids "can't open" error on iOS)
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deepLink;
            document.body.appendChild(iframe);
            // Also try direct navigation after a short delay as backup
            setTimeout(() => { window.location.href = deepLink; }, 300);
        }

        async function processResponse() {
            if (!eventId || !email || !response) {
                showError('Missing required parameters. Please use the link from your invitation email.');
                return;
            }

            // Try to fetch event details from the API (optional - works if backend is available)
            try {
                const eventRes = await fetch(`${window.location.origin}/api/get-event?id=${eventId}`);
                if (eventRes.ok) {
                    const data = await eventRes.json();
                    if (data && data.title) eventData = data;
                }
            } catch (e) {
                console.log('Event fetch skipped (using URL params):', e.message);
            }

            const isAccept = response === 'accept';

            // Set deep link button for manual tap
            const btn = document.getElementById('deepLinkBtn');
            if (btn) btn.href = buildDeepLink(isAccept ? 'accept' : 'decline');

            document.getElementById('statusIcon').textContent = isAccept ? '✓' : '✕';
            document.getElementById('statusIcon').style.background = isAccept
                ? 'linear-gradient(135deg, #10B981 0%, #059669 100%)'
                : 'linear-gradient(135deg, #EF4444 0%, #DC2626 100%)';
            document.getElementById('statusTitle').textContent = isAccept ? '🎉 You\'re In!' : 'Response Recorded';
            
            if (isAccept) {
                document.getElementById('statusMessage').textContent = `Great! You accepted "${eventTitle}". Now let the host know when you're available.`;

                // Notify host of acceptance via API (best-effort)
                try {
                    await fetch(`${window.location.origin}/api/notify-host`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ event_id: eventId, email: email, response: 'accepted' })
                    });
                } catch (e) {}

                // Store acceptance in localStorage
                try {
                    const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
                    notifications.push({
                        id: Date.now().toString(),
                        type: 'rsvp_accepted',
                        message: `${email} accepted your invitation to "${eventTitle}"!`,
                        eventId: eventId,
                        timestamp: new Date().toISOString(),
                        read: false
                    });
                    localStorage.setItem('notifications', JSON.stringify(notifications));
                } catch (e) {}

                // On mobile the app should already be opening via deep link above.
                // Show the availability form as fallback (desktop, or app not installed).
                setTimeout(() => {
                    document.getElementById('availabilityForm').classList.remove('hidden');
                    renderCalendar();
                }, 800);

                // Show a mobile hint if app didn't open
                if (isMobile()) {
                    document.getElementById('statusMessage').textContent = `Opening MacroManage app... If it didn't open, set your availability below.`;
                }
            } else {
                document.getElementById('statusMessage').textContent = `You declined "${eventTitle}". The host has been notified.`;
                setTimeout(() => {
                    document.getElementById('finalMessage').classList.remove('hidden');
                }, 1200);
                
                // Notify host of decline via API
                try {
                    await fetch(`${window.location.origin}/api/notify-host`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ event_id: eventId, email: email, response: 'declined' })
                    });
                } catch (e) {}
                    
                // Store in localStorage
                try {
                    const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
                    notifications.push({
                        id: Date.now().toString(),
                        type: 'rsvp_declined',
                        message: `${email} declined your invitation to "${eventTitle}".`,
                        eventId: eventId,
                        timestamp: new Date().toISOString(),
                        read: false
                    });
                    localStorage.setItem('notifications', JSON.stringify(notifications));
                } catch (e) {}
            }
        }

        function renderCalendar() {
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            
            document.getElementById('calendarMonth').textContent = months[currentMonth] + ' ' + currentYear;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            let html = dayNames.map(d => `<div class="text-center text-xs font-semibold text-brown-400 py-1">${d}</div>`).join('');
            
            for (let i = 0; i < firstDay; i++) {
                html += '<div></div>';
            }
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isPast = date < today;
                const isSelected = selectedDates.includes(dateStr);
                
                const classes = isPast 
                    ? 'text-beige-300 cursor-not-allowed'
                    : isSelected
                    ? 'bg-brown-500 text-white font-semibold cursor-pointer hover:bg-brown-600'
                    : 'bg-beige-200 text-brown-600 cursor-pointer hover:bg-beige-300';
                
                html += `<div onclick="${isPast ? '' : `toggleDate('${dateStr}')`}" class="${classes} text-center py-2 rounded-lg text-sm transition-all">${day}</div>`;
            }
            
            document.getElementById('calendar').innerHTML = html;
            updateTimeSlotsDisplay();
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function toggleDate(dateStr) {
            if (selectedDates.includes(dateStr)) {
                selectedDates = selectedDates.filter(d => d !== dateStr);
                delete dateTimeSlots[dateStr];
            } else {
                selectedDates.push(dateStr);
                selectedDates.sort();
                if (!dateTimeSlots[dateStr]) {
                    dateTimeSlots[dateStr] = [{ start: '', end: '' }];
                }
            }
            renderCalendar();
        }

        function updateTimeSlotsDisplay() {
            const container = document.getElementById('timeSlots');
            const count = document.getElementById('selectedCount');
            count.textContent = `${selectedDates.length} date(s) selected`;
            
            if (selectedDates.length === 0) {
                container.innerHTML = '<p class="text-sm text-brown-400 text-center">Select dates above to set time slots</p>';
                return;
            }
            
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            container.innerHTML = '<div class="border-t border-beige-200 pt-3"><p class="text-sm font-semibold text-brown-700 mb-3">⏰ Set your availability for each date:</p>' +
                selectedDates.map(d => {
                    const slots = dateTimeSlots[d] || [{ start: '', end: '' }];
                    const dateObj = new Date(d + 'T12:00:00');
                    const label = dayNames[dateObj.getDay()] + ', ' + months[dateObj.getMonth()] + ' ' + dateObj.getDate();
                    return `<div class="mb-4 bg-beige-50 rounded-xl p-3">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold text-brown-700">${label}</span>
                            <button onclick="addTimeSlot('${d}')" class="px-2 py-1 text-xs bg-brown-500 text-white rounded hover:bg-brown-600">+ Add Time</button>
                        </div>
                        ${slots.map((slot, idx) => `
                            <div class="flex items-center gap-2 mb-2">
                                <input type="time" value="${slot.start}" onchange="updateTimeSlot('${d}', ${idx}, 'start', this.value)" class="border border-beige-300 rounded-lg px-2 py-1 text-sm text-brown-700 bg-white flex-1">
                                <span class="text-brown-400 text-xs font-medium">to</span>
                                <input type="time" value="${slot.end}" onchange="updateTimeSlot('${d}', ${idx}, 'end', this.value)" class="border border-beige-300 rounded-lg px-2 py-1 text-sm text-brown-700 bg-white flex-1">
                                ${slots.length > 1 ? `<button onclick="removeTimeSlot('${d}', ${idx})" class="px-2 py-1 text-xs bg-red-500 text-white rounded hover:bg-red-600">×</button>` : ''}
                            </div>
                        `).join('')}
                    </div>`;
                }).join('') + '</div>';
        }

        function updateTimeSlot(date, slotIdx, field, value) {
            if (!dateTimeSlots[date]) dateTimeSlots[date] = [{ start: '', end: '' }];
            dateTimeSlots[date][slotIdx][field] = value;
        }

        function addTimeSlot(date) {
            if (!dateTimeSlots[date]) dateTimeSlots[date] = [];
            dateTimeSlots[date].push({ start: '', end: '' });
            updateTimeSlotsDisplay();
        }

        function removeTimeSlot(date, slotIdx) {
            if (dateTimeSlots[date] && dateTimeSlots[date].length > 1) {
                dateTimeSlots[date].splice(slotIdx, 1);
                updateTimeSlotsDisplay();
            }
        }

        async function submitAvailability() {
            if (selectedDates.length === 0) {
                alert('Please select at least one date!');
                return;
            }
            
            // Notify host via API (best-effort)
            try {
                await fetch(`${window.location.origin}/api/notify-host`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        event_id: eventId, 
                        email: email, 
                        response: 'accepted',
                        availability: dateTimeSlots
                    })
                });
            } catch (e) {
                console.log('API notify skipped:', e.message);
            }
            
            // Store in localStorage (for same-device / website testing)
            try {
                const notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
                notifications.push({
                    id: Date.now().toString(),
                    type: 'rsvp_accepted',
                    message: `${email} accepted your invitation to "${eventTitle}"!`,
                    eventId: eventId,
                    timestamp: new Date().toISOString(),
                    read: false
                });
                localStorage.setItem('notifications', JSON.stringify(notifications));

                const responses = JSON.parse(localStorage.getItem('event_responses') || '[]');
                responses.push({
                    event_id: eventId,
                    email: email,
                    response: 'accepted',
                    availability: dateTimeSlots
                });
                localStorage.setItem('event_responses', JSON.stringify(responses));
            } catch (e) {}
            
            // Show success
            document.getElementById('availabilityForm').classList.add('hidden');
            document.getElementById('statusTitle').textContent = '✅ All Set!';
            document.getElementById('statusMessage').textContent = 'Your availability has been sent to the host!';
            document.getElementById('finalMessage').classList.remove('hidden');

            // On mobile, redirect to the app
            if (isMobile()) {
                document.getElementById('statusMessage').textContent = 'Opening MacroManage app...';
                setTimeout(() => { window.location.href = buildDeepLink('accept'); }, 600);
            }
        }

        function showError(msg) {
            document.getElementById('statusIcon').textContent = '!';
            document.getElementById('statusIcon').style.background = 'linear-gradient(135deg, #EF4444 0%, #DC2626 100%)';
            document.getElementById('statusTitle').textContent = 'Error';
            document.getElementById('statusMessage').textContent = msg;
        }

        processResponse();
    </script>
</body>
</html>
