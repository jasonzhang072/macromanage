<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroManage - Preserve Human Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: { 50: '#FFFBF5', 100: '#FDF6E9', 200: '#F5EBD8', 300: '#EDE0C8', 400: '#E5D5B8' },
                        brown: { 400: '#C4A882', 500: '#B8956E', 600: '#9A7B5A', 700: '#7D6245', 800: '#604A32' }
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { background: #FDF6E9; transition: background 0.3s, color 0.3s; }
        .card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(154, 123, 90, 0.08); transition: background 0.3s, box-shadow 0.3s; }
        .nav-box { transition: all 0.2s; background: white; color: #7D6245; }
        .nav-box.active { background: #B8956E; color: white; }
        .nav-box:hover { background: #F5EBD8; }
        .btn-primary { background: linear-gradient(135deg, #B8956E 0%, #9A7B5A 100%); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #F5EBD8; color: #7D6245; padding: 12px 24px; border-radius: 30px; font-weight: 600; transition: all 0.2s; }
        .btn-secondary:hover { background: #EDE0C8; }
        .input-field { width: 100%; padding: 12px 16px; border: 2px solid #F5EBD8; border-radius: 12px; outline: none; transition: all 0.2s; background: white; color: #3D2410; }
        .input-field:focus { border-color: #B8956E; }
        .date-pill, .time-pill { transition: all 0.15s; cursor: pointer; }
        .date-pill:hover, .time-pill:hover { transform: scale(1.05); }
        .tab-content { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Dark Mode */
        body.dark-mode { background: #1a1a1a !important; color: #e0e0e0; }
        body.dark-mode .card { background: #2a2a2a; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3); }
        body.dark-mode .nav-box { background: #2a2a2a; color: #e0e0e0; }
        body.dark-mode .nav-box.active { background: #B8956E; color: white; }
        body.dark-mode .nav-box:hover { background: #3a3a3a; }
        body.dark-mode .input-field { background: #3a3a3a; border-color: #4a4a4a; color: #e0e0e0; }
        body.dark-mode .btn-secondary { background: #3a3a3a; color: #e0e0e0; }
        body.dark-mode .btn-secondary:hover { background: #4a4a4a; }
        body.dark-mode .bg-white { background: #2a2a2a !important; }
        body.dark-mode .text-brown-700 { color: #d4a574 !important; }
        body.dark-mode .text-brown-600 { color: #c4956e !important; }
        body.dark-mode .text-brown-500 { color: #b8956e !important; }
        body.dark-mode .text-brown-400 { color: #a4856e !important; }
        body.dark-mode .bg-beige-100 { background: #3a3a3a !important; }
        body.dark-mode .bg-beige-200 { background: #4a4a4a !important; }
        body.dark-mode .border-beige-200 { border-color: #4a4a4a !important; }
        body.dark-mode .bg-green-50 { background: #1a3a1a !important; }
        body.dark-mode .bg-green-100 { background: #2a4a2a !important; }
        body.dark-mode .bg-yellow-100 { background: #4a4a1a !important; }
        body.dark-mode .bg-red-100 { background: #4a1a1a !important; }
        body.dark-mode .text-green-700 { color: #6ade6a !important; }
        body.dark-mode .text-yellow-700 { color: #dede6a !important; }
        body.dark-mode .text-red-700 { color: #de6a6a !important; }
    </style>
</head>
<body class="min-h-screen" style="background: #FDF6E9;">
    <!-- Top Header -->
    <div class="flex justify-between items-center px-6 py-4 bg-white">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full bg-brown-500 flex items-center justify-center text-white font-bold">M</div>
            <span class="text-lg font-semibold text-brown-700">MacroManage</span>
        </div>
        <div class="flex items-center gap-4">
            <button id="darkModeToggle" onclick="app.toggleDarkMode()" class="text-2xl cursor-pointer" title="Toggle Dark Mode">🌙</button>
            <div class="relative cursor-pointer" onclick="app.toggleNotifications()">
                <span class="text-2xl">🔔</span>
                <span id="notificationBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="flex justify-center gap-2 px-6 py-4 bg-white border-b border-beige-200">
        <button class="nav-box px-6 py-2 rounded-lg font-medium text-sm transition-all" data-tab="dashboard" onclick="app.navigate('dashboard')">Dashboard</button>
        <button class="nav-box px-6 py-2 rounded-lg font-medium text-sm transition-all" data-tab="events" onclick="app.navigate('events')">Events</button>
        <button class="nav-box px-6 py-2 rounded-lg font-medium text-sm transition-all" data-tab="create" onclick="app.navigate('create')">Create</button>
        <button class="nav-box px-6 py-2 rounded-lg font-medium text-sm transition-all" data-tab="friends" onclick="app.navigate('friends')">Friends</button>
        <button class="nav-box px-6 py-2 rounded-lg font-medium text-sm transition-all" data-tab="profile" onclick="app.navigate('profile')">Profile</button>
        <button class="nav-box px-6 py-2 rounded-lg font-medium text-sm transition-all" data-tab="team" onclick="app.navigate('team')">Team</button>
    </div>

    <!-- Banner -->
    <div class="bg-brown-500 text-white text-center py-3">
        <p class="text-sm font-medium">Preserve Human Connection</p>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-6">

        <!-- Main Content -->
        <div id="app"></div>
    </div>

    <script src="macromanage.js?v=3.1.0"></script>
</body>
</html>
